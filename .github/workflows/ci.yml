name: Frontend CI

on:
  push:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set project version
        run: npm version "1.0.${{ github.run_number }}" --no-git-tag-version --allow-same-version

      - name: Generate version file
        run: |
          mkdir -p frontend/src/environments
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          echo "export const VERSION = '${{ github.run_number }}-${SHORT_SHA}';" \
            > frontend/src/environments/version.ts

      - name: Build (develop)
        if: github.ref == 'refs/heads/develop'
        run: npm run build -- --configuration development

      - name: Build (production)
        if: github.ref == 'refs/heads/main'
        run: npm run build -- --configuration production

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main'
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_DEPLOY_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}