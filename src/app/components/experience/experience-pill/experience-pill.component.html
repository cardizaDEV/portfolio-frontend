<div class="w-80 bg-surface-2 border border-border rounded-xl p-4 shadow-xl">

    <div class="flex items-start justify-between gap-2 mb-2">
        <p class="font-serif text-base text-content leading-snug">{{ exp.title }}</p>
        <span class="font-mono text-base font-medium px-2 py-0.5 rounded-full whitespace-nowrap shrink-0"
            [style.background-color]="exp.status.colorBg" [style.color]="exp.status.colorText"
            [style.border]="'0.5px solid ' + exp.status.colorBorder">
            {{ exp.status.name }}
        </span>
    </div>

    <p class="font-mono text-base text-muted mb-1">{{ exp.organization.name }}</p>
    <p class="font-mono text-base text-subtle mb-4">
        {{ formatDate(exp.startDate) }} —
        {{ exp.endDate ? formatDate(exp.endDate) : ('EXPERIENCE.PRESENT' | translate) }}
    </p>

    <p *ngIf="exp.description" class="text-base text-muted leading-relaxed mb-4">
        {{ exp.description }}
    </p>

    <button *ngIf="exp.technologies.length"
        class="font-mono text-base text-primary border border-primary-border rounded-lg px-3 py-1.5 hover:bg-primary-light transition-colors cursor-pointer w-full text-center"
        (click)="openDetail.emit(exp)">
        {{ 'EXPERIENCE.VIEW_DETAIL' | translate }} →
    </button>

</div>
